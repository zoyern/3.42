<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.42 — Émergence Fractale</title>
    <style>
        :root {
            --tier-0: #00e5ff;
            --tier-1: #3b82f6;
            --tier-2: #a855f7;
            --tier-3: #6b7280;
            --bg-dark: #0a0a0f;
            --bg-card: #1a1a25;
            --text-primary: #e0e0e0;
            --text-secondary: #909098;
            --border-color: #303038;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem 2rem 1rem;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.05), rgba(58, 130, 246, 0.05));
        }

        .header-content {
            max-width: 100%;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #00e5ff, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .stats {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .container {
            display: flex;
            flex: 1;
            gap: 0;
            overflow: hidden;
        }

        .main-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: var(--bg-dark);
        }

        .visualization {
            position: relative;
            width: 900px;
            height: 900px;
        }

        .center-point {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, var(--tier-0), transparent);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--tier-0);
        }

        .tier-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px dashed;
            border-radius: 50%;
            opacity: 0.15;
        }

        .tier-ring-0 {
            width: 240px;
            height: 240px;
            border-color: var(--tier-0);
        }

        .tier-ring-1 {
            width: 440px;
            height: 440px;
            border-color: var(--tier-1);
        }

        .tier-ring-2 {
            width: 660px;
            height: 660px;
            border-color: var(--tier-2);
        }

        .tier-ring-3 {
            width: 840px;
            height: 840px;
            border-color: var(--tier-3);
        }

        .tier-label {
            position: absolute;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.6;
            pointer-events: none;
        }

        .tier-label-0 {
            color: var(--tier-0);
            top: 50%;
            right: -80px;
            transform: translateY(-50%);
        }

        .tier-label-1 {
            color: var(--tier-1);
            bottom: -120px;
            left: 50%;
            transform: translateX(-50%);
        }

        .tier-label-2 {
            color: var(--tier-2);
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
        }

        .tier-label-3 {
            color: var(--tier-3);
            left: -100px;
            bottom: 50%;
            transform: translateY(50%);
        }

        .boson {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: monospace;
            font-size: 1.4rem;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .boson-0 {
            background: rgba(0, 229, 255, 0.15);
            border-color: var(--tier-0);
            color: var(--tier-0);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        .boson-1 {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--tier-1);
            color: var(--tier-1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .boson-2 {
            background: rgba(168, 85, 247, 0.15);
            border-color: var(--tier-2);
            color: var(--tier-2);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        .boson-3 {
            background: rgba(107, 114, 128, 0.15);
            border-color: var(--tier-3);
            color: var(--tier-3);
            box-shadow: 0 0 15px rgba(107, 114, 128, 0.4);
        }

        .boson:hover {
            transform: translate(-50%, -50%) scale(1.3);
        }

        .boson:hover.boson-0 {
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.8);
        }

        .boson:hover.boson-1 {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.8);
        }

        .boson:hover.boson-2 {
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.8);
        }

        .boson:hover.boson-3 {
            box-shadow: 0 0 30px rgba(107, 114, 128, 0.8);
        }

        .boson.active {
            transform: translate(-50%, -50%) scale(1.3);
        }

        .sidebar {
            width: 350px;
            background-color: var(--bg-card);
            border-left: 1px solid var(--border-color);
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-align: center;
        }

        .boson-details {
            display: none;
            gap: 1.5rem;
        }

        .boson-details.active {
            display: flex;
            flex-direction: column;
        }

        .detail-section {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .detail-section:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .detail-value {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .graviton-display {
            font-family: monospace;
            font-size: 1.8rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .boson-symbol {
            font-family: monospace;
            font-size: 2.4rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .boson-names {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .boson-name {
            font-weight: 600;
        }

        .boson-name-en {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .composition-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-family: monospace;
            color: var(--text-secondary);
        }

        .composition-item {
            padding: 0.3rem 0.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-left: 2px solid var(--tier-0);
            border-radius: 3px;
        }

        .decisions-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .decision-badge {
            background: rgba(58, 130, 246, 0.2);
            border: 1px solid var(--tier-1);
            color: var(--tier-1);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .bottom-section {
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.05), rgba(58, 130, 246, 0.05));
        }

        .bottom-content {
            display: flex;
            gap: 2rem;
            max-width: 100%;
            margin: 0 auto;
        }

        .gluon-group, .separator-group {
            display: flex;
            gap: 0.5rem;
        }

        .gluon-box, .separator-box {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--tier-0);
            transition: all 0.3s ease;
            cursor: default;
        }

        .gluon-box:hover {
            background: rgba(0, 229, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        .separator-box {
            width: 45px;
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .separator-box:hover {
            color: var(--tier-1);
            background: rgba(59, 130, 246, 0.15);
        }

        .legend {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        @media (max-height: 900px) {
            .visualization {
                width: 700px;
                height: 700px;
            }

            .tier-ring-0 { width: 240px; height: 240px; }
            .tier-ring-1 { width: 440px; height: 440px; }
            .tier-ring-2 { width: 660px; height: 660px; }
            .tier-ring-3 { width: 840px; height: 840px; }
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>3.42 — Émergence Fractale</h1>
            <div class="stats">
                <div class="stat-item">
                    <span>Décisions:</span>
                    <span class="stat-value">79</span>
                </div>
                <div class="stat-item">
                    <span>Bosons:</span>
                    <span class="stat-value">18</span>
                </div>
                <div class="stat-item">
                    <span>Gluons:</span>
                    <span class="stat-value">5</span>
                </div>
                <div class="stat-item">
                    <span>Gravitons:</span>
                    <span class="stat-value">18</span>
                </div>
                <div class="stat-item">
                    <span>Questions résolues:</span>
                    <span class="stat-value">28/28</span>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="main-area">
            <div class="visualization">
                <div class="center-point"></div>

                <div class="tier-ring tier-ring-0"></div>
                <div class="tier-ring tier-ring-1"></div>
                <div class="tier-ring tier-ring-2"></div>
                <div class="tier-ring tier-ring-3"></div>

                <div class="tier-label tier-label-0">Compute (s)</div>
                <div class="tier-label tier-label-1">Structure (p)</div>
                <div class="tier-label tier-label-2">Flux (d)</div>
                <div class="tier-label tier-label-3">Méta (f)</div>

                <div id="bosons-container"></div>

                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: var(--tier-0);"></div>
                        <span>Compute</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: var(--tier-1);"></div>
                        <span>Structure</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: var(--tier-2);"></div>
                        <span>Flux</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: var(--tier-3);"></div>
                        <span>Méta</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-empty">Survolez un boson pour voir ses détails</div>
            <div class="boson-details" id="boson-details"></div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="bottom-content">
            <div>
                <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 0.5rem;">Gluons</div>
                <div class="gluon-group">
                    <div class="gluon-box">{}</div>
                    <div class="gluon-box">()</div>
                    <div class="gluon-box">[]</div>
                    <div class="gluon-box">""</div>
                    <div class="gluon-box">''</div>
                </div>
            </div>
            <div>
                <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 0.5rem;">Séparateurs</div>
                <div class="separator-group">
                    <div class="separator-box">;</div>
                    <div class="separator-box">,</div>
                    <div class="separator-box">⎵</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const bosons = [
            // Tier 0 - Compute
            { sym: '|', fr: 'CONNECTER', en: 'CONNECT', tier: 0, cpu: 'PIPE/SPSC', graviton: '|{}',
                compositions: ['|| = OR logique', '|* = map', '|- = filter', '|+ = fold', '|! = async'],
                decisions: ['D8', 'D65', 'D73'] },
            { sym: '~', fr: 'DIFFUSER', en: 'BROADCAST', tier: 0, cpu: 'SIMD/broadcast', graviton: '~{}',
                compositions: ['~* = parallel map GPU', '~| = reduce', '~^ = quantum parallel'],
                decisions: ['D14', 'D59', 'D65'] },
            { sym: '^', fr: 'SUPERPOSER', en: 'SUPERPOSE', tier: 0, cpu: 'Qubit rotation', graviton: '^{}',
                compositions: ['^! = X gate (NOT)', '^~ = H gate (Hadamard)', '^| = CNOT', '^(θ) = Rz'],
                decisions: ['D14', 'D15', 'D22'] },

            // Tier 1 - Structure
            { sym: ':', fr: 'DÉFINIR', en: 'DEFINE', tier: 1, cpu: 'LEA/type decl', graviton: ':{}',
                compositions: [':. = accès natif', ': A + B = union', 'Name : {} = type'],
                decisions: ['D35', 'D47', 'D56'] },
            { sym: '=', fr: 'LIER', en: 'BIND', tier: 1, cpu: 'MOV/STORE', graviton: '={}',
                compositions: ['= seul = assignation', '== dans sugar', '.= = apply diff'],
                decisions: ['D5', 'D70'] },
            { sym: '.', fr: 'ACCÉDER', en: 'ACCESS', tier: 1, cpu: 'LOAD offset', graviton: '.{}',
                compositions: ['.~ = dérivée (autograd)', '.! = snapshot/reverse', '.= = apply', '.. = parent'],
                decisions: ['D49', 'D70'] },
            { sym: '!', fr: 'INVERSER', en: 'INVERT', tier: 1, cpu: 'NOT/NEG', graviton: '!{}',
                compositions: ['!? = defer/lazy', '!{} = defer block', '.! = reverse'],
                decisions: ['D11', 'D60'] },
            { sym: '#', fr: 'CONFIGURER', en: 'CONFIGURE', tier: 1, cpu: 'NOP/trap/meta', graviton: '#{}',
                compositions: ['#{key:val} = annotation', '# = erreur/OOB', '#{ precision: fast }'],
                decisions: ['D19', 'D75'] },

            // Tier 2 - Flux
            { sym: '?', fr: 'MESURER', en: 'MEASURE', tier: 2, cpu: 'CMP/TEST', graviton: '?{}',
                compositions: ['? = if (test)', '?? = while (boucle)', '?{} = match/switch'],
                decisions: ['D7'] },
            { sym: '<', fr: 'SORTIR', en: 'OUTPUT', tier: 2, cpu: 'OUT/PUSH', graviton: '<{}',
                compositions: ['<< = return', '<> = I/O bidirectionnel', '<{} = output scope'],
                decisions: ['D6'] },
            { sym: '>', fr: 'ENTRER', en: 'INPUT', tier: 2, cpu: 'IN/POP', graviton: '>{}',
                compositions: ['>> = continue', '>< = break', '>{} = input scope'],
                decisions: ['D6', 'D10'] },
            { sym: '+', fr: 'ACCUMULER', en: 'ACCUMULATE', tier: 2, cpu: 'ADD/INC', graviton: '+{}',
                compositions: ['+{} = fold/reduce', '+= = accumulate sugar', 'type A + B = union'],
                decisions: ['D58'] },
            { sym: '-', fr: 'RÉDUIRE', en: 'REDUCE', tier: 2, cpu: 'SUB/DEC', graviton: '-{}',
                compositions: ['-{} = filter', '-= = decrement sugar'],
                decisions: ['D54', 'D58'] },
            { sym: '*', fr: 'TRANSFORMER', en: 'TRANSFORM', tier: 2, cpu: 'MUL/IMUL', graviton: '*{}',
                compositions: ['*{} = map', '** = copie explicite', '*^ = wedge (GA)', '*. = dot (GA)'],
                decisions: ['D5', 'D58', 'D77'] },

            // Tier 3 - Méta
            { sym: '%', fr: 'PROPORTIONNER', en: 'PROPORTION', tier: 3, cpu: 'DIV (remainder)', graviton: '%{}',
                compositions: ['%% = normalize', '%? = probabilité', '%"fmt" = format string'],
                decisions: ['D17'] },
            { sym: '@', fr: 'RÉFÉRENCER', en: 'REFERENCE', tier: 3, cpu: 'LEA/address-of', graviton: '@{}',
                compositions: ['@ = borrow read', '@@ = borrow write exclusif', '@ = self dans méthode'],
                decisions: ['D5', 'D34', 'D42'] },
            { sym: '/', fr: 'DIVISER', en: 'DIVIDE', tier: 3, cpu: 'DIV (quotient)', graviton: '/{}',
                compositions: ['// = commentaire', '/* */ = commentaire bloc', '/= = divide sugar'],
                decisions: ['D26', 'D27'] },
            { sym: '_', fr: 'IGNORER', en: 'IGNORE', tier: 3, cpu: 'NOP', graviton: '_{}',
                compositions: ['_ = wildcard/placeholder', '_ = typed hole', '_{} = ignore scope'],
                decisions: ['D39'] },
        ];

        const tierRadii = [120, 220, 330, 420];
        let currentBoson = null;

        function initializeVisualization() {
            const container = document.getElementById('bosons-container');
            const tieredBosons = [[], [], [], []];

            bosons.forEach(boson => {
                tieredBosons[boson.tier].push(boson);
            });

            bosons.forEach((boson, index) => {
                const tierBosons = tieredBosons[boson.tier];
                const positionInTier = tierBosons.indexOf(boson);
                const count = tierBosons.length;
                const angle = (positionInTier / count) * Math.PI * 2 - Math.PI / 2;

                const radius = tierRadii[boson.tier];
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                const bosonEl = document.createElement('div');
                bosonEl.className = `boson boson-${boson.tier}`;
                bosonEl.textContent = boson.sym;
                bosonEl.style.left = `calc(50% + ${x}px)`;
                bosonEl.style.top = `calc(50% + ${y}px)`;
                bosonEl.dataset.index = index;

                bosonEl.addEventListener('mouseenter', () => showBosonDetails(boson, bosonEl));
                bosonEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleBosonDetails(boson, bosonEl);
                });

                container.appendChild(bosonEl);
            });

            document.addEventListener('click', () => {
                if (currentBoson) {
                    clearSelection();
                }
            });
        }

        function showBosonDetails(boson, element) {
            if (currentBoson) return;

            const sidebar = document.querySelector('.sidebar');
            const emptyState = sidebar.querySelector('.sidebar-empty');
            const detailsDiv = document.getElementById('boson-details');

            emptyState.style.display = 'none';

            let tierName = ['Compute', 'Structure', 'Flux', 'Méta'][boson.tier];
            let spinValue = '1';

            detailsDiv.innerHTML = `
                <div class="detail-section">
                    <div class="boson-symbol" style="color: var(--tier-${boson.tier});">${boson.sym}</div>
                    <div class="boson-names">
                        <div class="boson-name">${boson.fr}</div>
                        <div class="boson-name-en">${boson.en}</div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-label">Tier + Rôle</div>
                    <div class="detail-value">Tier ${boson.tier} — ${tierName}</div>
                </div>

                <div class="detail-section">
                    <div class="detail-label">CPU Mapping</div>
                    <div class="detail-value" style="font-family: monospace; font-size: 0.9rem;">${boson.cpu}</div>
                </div>

                <div class="detail-section">
                    <div class="detail-label">Spin</div>
                    <div class="detail-value">${spinValue}</div>
                </div>

                <div class="detail-section">
                    <div class="detail-label">Graviton Form</div>
                    <div class="graviton-display">${boson.graviton}</div>
                </div>

                <div class="detail-section">
                    <div class="detail-label">Compositions</div>
                    <div class="composition-list">
                        ${boson.compositions.map(c => `<div class="composition-item">${c}</div>`).join('')}
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-label">Décisions Associées</div>
                    <div class="decisions-list">
                        ${boson.decisions.map(d => `<div class="decision-badge">${d}</div>`).join('')}
                    </div>
                </div>
            `;

            detailsDiv.classList.add('active');
            element.classList.add('active');
        }

        function toggleBosonDetails(boson, element) {
            if (currentBoson === boson) {
                clearSelection();
            } else {
                const allBosons = document.querySelectorAll('.boson');
                allBosons.forEach(b => b.classList.remove('active'));

                currentBoson = boson;
                showBosonDetails(boson, element);
            }
        }

        function clearSelection() {
            currentBoson = null;
            const sidebar = document.querySelector('.sidebar');
            const emptyState = sidebar.querySelector('.sidebar-empty');
            const detailsDiv = document.getElementById('boson-details');

            emptyState.style.display = 'flex';
            detailsDiv.classList.remove('active');
            detailsDiv.innerHTML = '';

            const allBosons = document.querySelectorAll('.boson');
            allBosons.forEach(b => b.classList.remove('active'));
        }

        initializeVisualization();
    </script>
</body>
</html>
